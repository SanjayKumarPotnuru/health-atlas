# Render Blueprint - Health Atlas Deployment
# https://render.com/docs/blueprint-spec

services:
  # Backend - Spring Boot API
  - type: web
    name: health-atlas-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_HOST
        fromDatabase:
          name: health-atlas-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: health-atlas-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: health-atlas-db
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: health-atlas-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: health-atlas-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://health-atlas-frontend.onrender.com,https://health-atlas-chatbot.onrender.com

  # Frontend - React + Vite
  - type: web
    name: health-atlas-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    region: oregon
    plan: free
    buildCommand: ""
    envVars:
      - key: VITE_API_URL
        value: https://health-atlas-backend.onrender.com/api
      - key: VITE_CHATBOT_URL
        value: https://health-atlas-chatbot.onrender.com

  # AI Chatbot - FastAPI
  - type: web
    name: health-atlas-chatbot
    runtime: docker
    dockerfilePath: ./medical-chatbot/Dockerfile
    dockerContext: ./medical-chatbot
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: CORS_ORIGINS
        value: https://health-atlas-frontend.onrender.com
      - key: BACKEND_URL
        value: https://health-atlas-backend.onrender.com

# PostgreSQL Database
databases:
  - name: health-atlas-db
    plan: free
    region: oregon
    databaseName: healthatlas
    user: healthatlas
